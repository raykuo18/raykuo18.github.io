  summary: >
    PhD researcher at Stony Brook University's SPELL Lab (advised by Prof. Paola Cascante-Bonilla),
    working on vision-language models. I re-examine the architectural defaults AI systems
    have inherited and built on — currently on both sides of the VLM interface (state space
    models as vision encoders; learned alternatives to tokenization on the language side).

