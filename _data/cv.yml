  sections:
    Research Interests:
      - bullet: "**Architectural defaults at the input boundaries of modern AI systems.** Vision encoders for VLMs (state space models vs Vision Transformers); tokenization (learned alternatives for writing systems the standard pipeline was never designed for); a hardware-and-systems perspective on how AI systems process the modalities they take in."

